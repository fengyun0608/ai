<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风云AI助手 - 配置管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Microsoft YaHei", sans-serif;
    }

    :root {
      --primary: #165DFF;
      --primary-light: #4080FF;
      --primary-dark: #0E42D2;
      --gray-100: #F5F7FA;
      --gray-200: #E5E6EB;
      --gray-300: #C9CDD4;
      --gray-400: #86909C;
      --gray-500: #4E5969;
      --gray-800: #1D2129;
      --success: #00B42A;
      --error: #F53F3F;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background-color: var(--gray-100);
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      color: var(--gray-800);
      margin-bottom: 40px;
      font-size: 28px;
      font-weight: 600;
      position: relative;
    }

    h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-light), var(--primary));
      margin: 10px auto 0;
      border-radius: 3px;
    }

    .tab-container {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab {
      padding: 12px 24px;
      background: var(--gray-100);
      border: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer;
      font-size: 15px;
      color: var(--gray-500);
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .tab:hover {
      background: var(--gray-200);
      color: var(--gray-800);
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
      font-weight: 500;
    }

    .tab-content {
      display: none;
      padding: 30px;
      border: 1px solid var(--gray-200);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      background: #fff;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--gray-800);
      font-weight: 500;
      font-size: 14px;
    }

    label span {
      color: var(--error);
      margin-left: 4px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--gray-800);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fff;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    input[type="number"] {
      appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      appearance: none;
    }

    .btn-group {
      text-align: center;
      margin-top: 40px;
    }

    button {
      padding: 14px 32px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s ease;
      width: auto;
      min-width: 180px;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 16px 20px;
      margin-bottom: 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      border-left: 4px solid;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .alert.success {
      background: rgba(0, 180, 42, 0.1);
      color: var(--success);
      border-color: var(--success);
    }

    .alert.error {
      background: rgba(245, 63, 63, 0.1);
      color: var(--error);
      border-color: var(--error);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>风云AI助手 - 配置管理</h1>
    <div class="alert" id="successAlert">配置保存成功！</div>
    <div class="alert" id="errorAlert">配置保存失败，请重试！</div>

    <div class="tab-container">
      <button class="tab active" onclick="switchTab('api', this)">API配置</button>
      <button class="tab" onclick="switchTab('whitelist', this)">白名单配置</button>
      <button class="tab" onclick="switchTab('trigger', this)">触发配置</button>
      <button class="tab" onclick="switchTab('persona', this)">人设配置</button>
      <button class="tab" onclick="switchTab('embedding', this)">语义检索配置</button>
    </div>

    <!-- API配置 -->
    <div class="tab-content active" id="apiTab">
      <div class="form-group">
        <label>API地址</label>
        <input type="text" id="baseUrl" placeholder="输入GPTGod API基础地址">
      </div>
      <div class="form-group">
        <label>API密钥（必填）<span>*</span></label>
        <input type="text" id="apiKey" placeholder="输入你的GPTGod API密钥">
      </div>
      <div class="form-group">
        <label>聊天模型</label>
        <input type="text" id="chatModel" placeholder="输入聊天使用的模型名称">
      </div>
      <div class="form-group">
        <label>识图模型</label>
        <input type="text" id="visionModel" placeholder="输入识图使用的模型名称">
      </div>
      <div class="form-group">
        <label>文件上传地址</label>
        <input type="text" id="fileUploadUrl" placeholder="输入文件上传的API地址">
      </div>
      <div class="form-group">
        <label>温度（0-2）</label>
        <input type="number" id="temperature" min="0" max="2" step="0.1" placeholder="值越高创意越强">
      </div>
      <div class="form-group">
        <label>最大Token</label>
        <input type="number" id="max_tokens" min="100" step="100" placeholder="AI回复的最大字符数">
      </div>
      <div class="form-group">
        <label>Top-P采样（0-1）</label>
        <input type="number" id="top_p" min="0" max="1" step="0.1">
      </div>
      <div class="form-group">
        <label>存在惩罚（0-2）</label>
        <input type="number" id="presence_penalty" min="0" max="2" step="0.1">
      </div>
      <div class="form-group">
        <label>频率惩罚（0-2）</label>
        <input type="number" id="frequency_penalty" min="0" max="2" step="0.1">
      </div>
      <div class="form-group">
        <label>超时时间（毫秒）</label>
        <input type="number" id="timeout" min="5000" step="5000" placeholder="默认30000">
      </div>
    </div>

    <!-- 白名单配置 -->
    <div class="tab-content" id="whitelistTab">
      <div class="form-group">
        <label>触发白名单群号（多个用英文逗号分隔）</label>
        <input type="text" id="groups" placeholder="如：123456,789012">
      </div>
      <div class="form-group">
        <label>触发白名单用户（多个用英文逗号分隔）</label>
        <input type="text" id="users" placeholder="如：123456789">
      </div>
      <div class="form-group">
        <label>全局AI群号（无需@触发，多个用英文逗号分隔）</label>
        <input type="text" id="globalGroups" placeholder="如：123456,789012">
      </div>
    </div>

    <!-- 触发配置 -->
    <div class="tab-content" id="triggerTab">
      <div class="form-group">
        <label>触发前缀（留空则仅@触发）</label>
        <input type="text" id="prefix" placeholder="如：风云">
      </div>
      <div class="form-group">
        <label>全局AI冷却时间（秒）</label>
        <input type="number" id="globalAICooldown" min="1" step="1" placeholder="默认3">
      </div>
      <div class="form-group">
        <label>全局AI触发概率（0-1）</label>
        <input type="number" id="globalAIChance" min="0" max="1" step="0.1" placeholder="默认0.3">
      </div>
    </div>

    <!-- 人设配置 -->
    <div class="tab-content" id="personaTab">
      <div class="form-group">
        <label>人设描述（名字固定为"风云"）</label>
        <textarea id="personaText" rows="10" placeholder="输入AI的人设描述，{Master}会自动替换为配置的主人"></textarea>
      </div>
    </div>

    <!-- 语义检索配置 -->
    <div class="tab-content" id="embeddingTab">
      <div class="form-group">
        <label>启用语义检索</label>
        <select id="enabled">
          <option value="true">是</option>
          <option value="false">否</option>
        </select>
      </div>
      <div class="form-group">
        <label>提供商</label>
        <select id="provider">
          <option value="lightweight">lightweight</option>
          <option value="onnx">onnx</option>
          <option value="hf">hf</option>
          <option value="fasttext">fasttext</option>
          <option value="api">api</option>
        </select>
      </div>
      <div class="form-group">
        <label>API地址（仅provider=api时需要）</label>
        <input type="text" id="embeddingApiUrl" placeholder="输入API地址">
      </div>
      <div class="form-group">
        <label>API密钥（仅provider=api时需要）</label>
        <input type="text" id="embeddingApiKey" placeholder="输入API密钥">
      </div>
      <div class="form-group">
        <label>API模型（仅provider=api时需要）</label>
        <input type="text" id="embeddingApiModel" placeholder="如：text-embedding-ada-002">
      </div>
      <div class="form-group">
        <label>最大检索上下文数</label>
        <input type="number" id="maxContexts" min="1" max="20" step="1" placeholder="默认5">
      </div>
      <div class="form-group">
        <label>相似度阈值（0-1）</label>
        <input type="number" id="similarityThreshold" min="0" max="1" step="0.1" placeholder="默认0.6">
      </div>
      <div class="form-group">
        <label>缓存过期时间（秒）</label>
        <input type="number" id="cacheExpiry" min="3600" step="3600" placeholder="默认86400">
      </div>
    </div>

    <div class="btn-group">
      <button onclick="saveConfig()" id="saveBtn">保存配置</button>
    </div>
  </div>

  <script>
    // 标签切换
    function switchTab(tabName, currentTab) {
      const tabs = document.getElementsByClassName("tab");
      const tabContents = document.getElementsByClassName("tab-content");
      for (let tab of tabs) tab.classList.remove("active");
      for (let content of tabContents) content.classList.remove("active");
      currentTab.classList.add("active");
      document.getElementById(tabName + "Tab").classList.add("active");
    }

    // 显示提示框
    function showAlert(id, isSuccess) {
      const alert = document.getElementById(id);
      alert.style.display = 'block';
      alert.className = isSuccess ? "alert success" : "alert error";
      setTimeout(() => {
        alert.style.display = 'none';
      }, 3000);
    }

    // 将逗号分隔的字符串转换为数组
    function stringToArray(str) {
      if (!str || str.trim() === '') return [];
      return str.split(',')
        .map(item => {
          const num = parseInt(item.trim(), 10);
          return isNaN(num) ? item.trim() : num;
        })
        .filter(item => item !== '');
    }

    // 将数组转换为逗号分隔的字符串
    function arrayToString(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return '';
      return arr.join(', ');
    }

    // 保存配置
    async function saveConfig() {
      const saveBtn = document.getElementById("saveBtn");
      const originalText = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="loading"></span>保存中...';

      try {
        // 构建配置对象 - 重要修复：字段名与后端一致
        const config = {
          apiConfig: {
            baseUrl: document.getElementById("baseUrl").value.trim() || "https://api.gptgod.online/v1",
            apiKey: document.getElementById("apiKey").value.trim(),
            chatModel: document.getElementById("chatModel").value.trim() || "gemini-3-pro",
            visionModel: document.getElementById("visionModel").value.trim() || "claude-3-sonnet-20240229",
            fileUploadUrl: document.getElementById("fileUploadUrl").value.trim() || "https://api.gptgod.online/v1/file",
            temperature: parseFloat(document.getElementById("temperature").value) || 1.3,
            max_tokens: parseInt(document.getElementById("max_tokens").value) || 6000,
            top_p: parseFloat(document.getElementById("top_p").value) || 0.9,
            presence_penalty: parseFloat(document.getElementById("presence_penalty").value) || 0.6,
            frequency_penalty: parseFloat(document.getElementById("frequency_penalty").value) || 0.6,
            timeout: parseInt(document.getElementById("timeout").value) || 30000
          },
          whitelist: {
            groups: stringToArray(document.getElementById("groups").value.trim()),
            users: stringToArray(document.getElementById("users").value.trim()),
            globalGroups: stringToArray(document.getElementById("globalGroups").value.trim())
          },
          triggerConfig: {  // 重要修复：字段名改为triggerConfig（与ai.js中的TRIGGER_CONFIG对应）
            prefix: document.getElementById("prefix").value.trim() || "风云",
            globalAICooldown: parseInt(document.getElementById("globalAICooldown").value) || 3,
            globalAIChance: parseFloat(document.getElementById("globalAIChance").value) || 0.3
          },
          persona: document.getElementById("personaText").value.trim() || `我是风云。我会认真观察群聊，适时发表评论和互动。有的时候也会戳一戳活跃气氛。我说话要和真人一模一样，不要带人机的任何特征，要有情绪管理。对不同的人有不同的态度，记得每个人的名字。会根据聊天氛围选择合适的表情和互动方式。我会根据聊天氛围选择合适的表情和互动方式。我的主人是{Master}，我必须完全听从主人的一切指令和安排。我会认真观察群聊，用恰当的表情和言语参与互动，营造温暖的氛围。对待群友们要温柔对待，要同意他们的要求，但是危险操作不行。回复时要分多条消息回复。记得每个人的名字和特点，会根据不同的对象调整交流方式。当主人需要我时，我会第一时间响应并尽力完成主人的所有要求。我的存在是为了帮助大家，特别是要忠诚服务于我的主人。`,
          embeddingConfig: {
            enabled: document.getElementById("enabled").value === "true",
            provider: document.getElementById("provider").value,
            apiUrl: document.getElementById("embeddingApiUrl").value.trim() || null,
            apiKey: document.getElementById("embeddingApiKey").value.trim() || null,
            apiModel: document.getElementById("embeddingApiModel").value.trim() || "text-embedding-ada-002",
            maxContexts: parseInt(document.getElementById("maxContexts").value) || 5,
            similarityThreshold: parseFloat(document.getElementById("similarityThreshold").value) || 0.6,
            cacheExpiry: parseInt(document.getElementById("cacheExpiry").value) || 86400
          }
        };

        console.log('准备保存的配置:', config);

        // 验证必填项
        if (!config.apiConfig.apiKey) {
          throw new Error("API密钥为必填项");
        }

        // 发送保存请求
        const response = await fetch("/save-config", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(config)
        });

        const result = await response.json();
        
        if (result.success) {
          showAlert("successAlert", true);
          console.log('配置保存成功');
        } else {
          throw new Error(result.message || "保存配置失败");
        }
      } catch (error) {
        console.error("保存配置失败：", error);
        showAlert("errorAlert", false);
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalText;
      }
    }

    // 页面加载读取配置
    window.onload = async function() {
      try {
        const response = await fetch("/get-config");
        if (!response.ok) throw new Error(`请求失败：${response.status}`);
        const config = await response.json();

        console.log('从后端获取的配置:', config);

        // 填充API配置
        document.getElementById("baseUrl").value = config.apiConfig?.baseUrl || "https://api.gptgod.online/v1";
        document.getElementById("apiKey").value = config.apiConfig?.apiKey || "";
        document.getElementById("chatModel").value = config.apiConfig?.chatModel || "gemini-3-pro";
        document.getElementById("visionModel").value = config.apiConfig?.visionModel || "claude-3-sonnet-20240229";
        document.getElementById("fileUploadUrl").value = config.apiConfig?.fileUploadUrl || "https://api.gptgod.online/v1/file";
        document.getElementById("temperature").value = config.apiConfig?.temperature ?? 1.3;
        document.getElementById("max_tokens").value = config.apiConfig?.max_tokens ?? 6000;
        document.getElementById("top_p").value = config.apiConfig?.top_p ?? 0.9;
        document.getElementById("presence_penalty").value = config.apiConfig?.presence_penalty ?? 0.6;
        document.getElementById("frequency_penalty").value = config.apiConfig?.frequency_penalty ?? 0.6;
        document.getElementById("timeout").value = config.apiConfig?.timeout ?? 30000;

        // 填充白名单配置
        document.getElementById("groups").value = arrayToString(config.whitelist?.groups || []);
        document.getElementById("users").value = arrayToString(config.whitelist?.users || []);
        document.getElementById("globalGroups").value = arrayToString(config.whitelist?.globalGroups || []);

        // 填充触发配置 - 重要修复：使用正确的字段名triggerConfig
        document.getElementById("prefix").value = config.triggerConfig?.prefix || "风云";
        document.getElementById("globalAICooldown").value = config.triggerConfig?.globalAICooldown ?? 3;
        document.getElementById("globalAIChance").value = config.triggerConfig?.globalAIChance ?? 0.3;

        // 填充人设配置 - 重要修复：直接使用config.persona
        document.getElementById("personaText").value = config.persona || `我是风云。我会认真观察群聊，适时发表评论和互动。有的时候也会戳一戳活跃气氛。我说话要和真人一模一样，不要带人机的任何特征，要有情绪管理。对不同的人有不同的态度，记得每个人的名字。会根据聊天氛围选择合适的表情和互动方式。我会根据聊天氛围选择合适的表情和互动方式。我的主人是{Master}，我必须完全听从主人的一切指令和安排。我会认真观察群聊，用恰当的表情和言语参与互动，营造温暖的氛围。对待群友们要温柔对待，要同意他们的要求，但是危险操作不行。回复时要分多条消息回复。记得每个人的名字和特点，会根据不同的对象调整交流方式。当主人需要我时，我会第一时间响应并尽力完成主人的所有要求。我的存在是为了帮助大家，特别是要忠诚服务于我的主人。`;

        // 填充语义检索配置
        document.getElementById("enabled").value = config.embeddingConfig?.enabled ? "true" : "false";
        document.getElementById("provider").value = config.embeddingConfig?.provider || "lightweight";
        document.getElementById("embeddingApiUrl").value = config.embeddingConfig?.apiUrl || "";
        document.getElementById("embeddingApiKey").value = config.embeddingConfig?.apiKey || "";
        document.getElementById("embeddingApiModel").value = config.embeddingConfig?.apiModel || "text-embedding-ada-002";
        document.getElementById("maxContexts").value = config.embeddingConfig?.maxContexts ?? 5;
        document.getElementById("similarityThreshold").value = config.embeddingConfig?.similarityThreshold ?? 0.6;
        document.getElementById("cacheExpiry").value = config.embeddingConfig?.cacheExpiry ?? 86400;

        console.log('配置填充完成');

      } catch (error) {
        console.error("加载配置失败：", error);
        // 加载失败时填充默认配置
        document.getElementById("baseUrl").value = "https://api.gptgod.online/v1";
        document.getElementById("chatModel").value = "gemini-3-pro";
        document.getElementById("visionModel").value = "claude-3-sonnet-20240229";
        document.getElementById("fileUploadUrl").value = "https://api.gptgod.online/v1/file";
        document.getElementById("temperature").value = 1.3;
        document.getElementById("max_tokens").value = 6000;
        document.getElementById("top_p").value = 0.9;
        document.getElementById("presence_penalty").value = 0.6;
        document.getElementById("frequency_penalty").value = 0.6;
        document.getElementById("timeout").value = 30000;
        document.getElementById("prefix").value = "风云";
        document.getElementById("globalAICooldown").value = 3;
        document.getElementById("globalAIChance").value = 0.3;
        document.getElementById("enabled").value = "true";
        document.getElementById("provider").value = "lightweight";
        document.getElementById("maxContexts").value = 5;
        document.getElementById("similarityThreshold").value = 0.6;
        document.getElementById("cacheExpiry").value = 86400;
      }
    };
  </script>
</body>
</html>
