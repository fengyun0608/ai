<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风云AI - 安全登录</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 400px; 
      margin: 50px auto; 
      padding: 20px; 
      border: 1px solid #eee; 
      border-radius: 8px; 
    }
    .error { 
      color: #dc3545; 
      margin-bottom: 15px; 
      text-align:center; 
    }
    .input-group { 
      margin: 15px 0; 
    }
    label { 
      display: block; 
      margin-bottom: 5px; 
      font-weight: bold; 
    }
    input { 
      width: 100%; 
      padding: 8px; 
      box-sizing: border-box; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
    }
    button { 
      width: 100%; 
      padding: 10px; 
      background: #007bff; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      margin-top:10px; 
    }
    button:hover { 
      background: #0056b3; 
    }
    .hint { 
      color: #6c757d; 
      font-size: 12px; 
      margin-top: 15px; 
      text-align:center; 
    }
  </style>
</head>
<body>
  <h2 style="text-align:center; color:#007bff;">风云AI助手 - 安全登录</h2>
  <div class="input-group">
    <label>6位临时验证码</label>
    <input type="text" id="code" placeholder="请输入群聊获取的临时验证码" maxlength="6">
  </div>
  <button onclick="verifyCode()">验证并进入配置页</button>
  <div class="hint">请在QQ群发送 #ai配置登陆 获取临时验证码</div>
  <script>
    async function verifyCode() {
      const code = document.getElementById('code').value.trim();
      if (!code || code.length !== 6) {
        alert('验证码必须为6位数字');
        return;
      }
      window.location.href = '/?code=' + code;
    }
  </script>
</body>
</html>
